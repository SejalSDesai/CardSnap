name: CardSnap
options:
  bundleIdPrefix: com.cardsnap
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15"

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  TARGETED_DEVICE_FAMILY: "1"
  ENABLE_PREVIEWS: "YES"

targets:
  CardSnap:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CardSnap
        excludes:
          - "Info.plist"
          - "**/*.md"
    info:
      path: CardSnap/Info.plist
      properties:
        NSCameraUsageDescription: "CardSnap uses your camera to scan business cards."
        NSPhotoLibraryUsageDescription: "CardSnap can import photos of business cards."
        NSContactsUsageDescription: "CardSnap can export scanned contacts to your Contacts app."
        UIRequiresFullScreen: true
        CFBundleDisplayName: CardSnap
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.cardsnap.app
      SWIFT_VERSION: "5.9"
      INFOPLIST_FILE: CardSnap/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    dependencies: []
    scheme:
      testTargets: []
